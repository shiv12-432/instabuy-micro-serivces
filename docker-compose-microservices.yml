version: '3.9'

services:

  # ── Databases ──────────────────────────────────────────────────────────────

  auth-db:
    image: mysql:8.0
    container_name: instabuy-auth-db
    environment:
      MYSQL_ROOT_PASSWORD: change_me
      MYSQL_DATABASE: instabuy_auth
    ports:
      - "3306:3306"
    volumes:
      - auth_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-db:
    image: mysql:8.0
    container_name: instabuy-product-db
    environment:
      MYSQL_ROOT_PASSWORD: change_me
      MYSQL_DATABASE: instabuy_products
    ports:
      - "3307:3306"
    volumes:
      - product_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-db:
    image: mysql:8.0
    container_name: instabuy-inventory-db
    environment:
      MYSQL_ROOT_PASSWORD: change_me
      MYSQL_DATABASE: instabuy_inventory
    ports:
      - "3308:3306"
    volumes:
      - inventory_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-db:
    image: mysql:8.0
    container_name: instabuy-payment-db
    environment:
      MYSQL_ROOT_PASSWORD: change_me
      MYSQL_DATABASE: instabuy_payment
    ports:
      - "3309:3306"
    volumes:
      - payment_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: mysql:8.0
    container_name: instabuy-order-db
    environment:
      MYSQL_ROOT_PASSWORD: change_me
      MYSQL_DATABASE: instabuy_orders
    ports:
      - "3310:3306"
    volumes:
      - order_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  seller-db:
    image: mysql:8.0
    container_name: instabuy-seller-db
    environment:
      MYSQL_ROOT_PASSWORD: change_me
      MYSQL_DATABASE: instabuy_seller
    ports:
      - "3311:3306"
    volumes:
      - seller_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Microservices ──────────────────────────────────────────────────────────

  auth-service:
    build: ./instabuy-auth-service
    container_name: instabuy-auth-service
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://auth-db:3306/instabuy_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: change_me
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: instabuy663@gmail.com
      SPRING_MAIL_PASSWORD: teavimzulwaknttr
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST: smtp.gmail.com

  product-service:
    build: ./instabuy-product-service
    container_name: instabuy-product-service
    depends_on:
      product-db:
        condition: service_healthy
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://product-db:3306/instabuy_products?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: change_me

  inventory-service:
    build: ./instabuy-inventory-service
    container_name: instabuy-inventory-service
    depends_on:
      inventory-db:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://inventory-db:3306/instabuy_inventory?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: change_me

  payment-service:
    build: ./instabuy-payment-service
    container_name: instabuy-payment-service
    depends_on:
      payment-db:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://payment-db:3306/instabuy_payment?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: change_me

  order-service:
    build: ./instabuy-order-service
    container_name: instabuy-order-service
    depends_on:
      order-db:
        condition: service_healthy
      inventory-service:
        condition: service_started
      payment-service:
        condition: service_started
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://order-db:3306/instabuy_orders?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: change_me
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083

  seller-service:
    build: ./instabuy-seller-service
    container_name: instabuy-seller-service
    depends_on:
      seller-db:
        condition: service_healthy
      order-service:
        condition: service_started
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://seller-db:3306/instabuy_seller?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: change_me
      ORDER_SERVICE_URL: http://order-service:8084
      PRODUCT_SERVICE_URL: http://product-service:8086

  # ── API Gateway ────────────────────────────────────────────────────────────

  api-gateway:
    build: ./instabuy-api-gateway
    container_name: instabuy-api-gateway
    depends_on:
      - auth-service
      - product-service
      - inventory-service
      - payment-service
      - order-service
      - seller-service
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8085
      PRODUCT_SERVICE_URL: http://product-service:8086
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      ORDER_SERVICE_URL: http://order-service:8084
      SELLER_SERVICE_URL: http://seller-service:8087

volumes:
  auth_db_data:
  product_db_data:
  inventory_db_data:
  payment_db_data:
  order_db_data:
  seller_db_data:
