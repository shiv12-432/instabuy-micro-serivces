server:
  port: 8080

spring:
  application:
    name: instabuy-api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

      routes:

        # ── Auth Service ─────────────────────────────────────────────────────
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/auth/**

        # ── Product Service ──────────────────────────────────────────────────
        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/products/**

        # ── Inventory Service ────────────────────────────────────────────────
        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/inventory/**

        # ── Payment Service ──────────────────────────────────────────────────
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/payments/**

        # ── Order Service ────────────────────────────────────────────────────
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/orders/**

        # ── Seller Service ───────────────────────────────────────────────────
        - id: seller-service
          uri: ${SELLER_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/seller/**

        # ── Admin (Seller Service) ───────────────────────────────────────────
        - id: admin-seller-service
          uri: ${SELLER_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/admin/**

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
